<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ARCADE | SCaD</title>

  <link rel="stylesheet" href="styles.css?v=13" />
  <link rel="manifest" href="manifest.json" />

  <meta name="theme-color" content="#020617" />
</head>

<body>
  <main class="arcade-app">
    <header class="arcade-topbar">
      <div class="brand-block">
        <span class="brand-kicker">SCaD</span>
        <h1>ARCADE</h1>
        <p>Portal de juegos</p>
        <span class="arcade-version">v.1.3</span>
      </div>

      <div class="top-actions">
        <span class="pwa-chip">PWA</span>

        <a class="fb-mini-access" href="https://www.scad.mx/arc-fb" data-game="fb" aria-label="Facebook ARCADE">
          f
        </a>

        <a class="login-link" href="https://www.scad.mx/arc-acceso">Iniciar sesión</a>
      </div>
    </header>

    <section class="game-grid" aria-label="Juegos disponibles">
      <article class="game-card game-tetris">
        <div class="game-glow"></div>

        <div class="game-icon">▦</div>

        <div class="game-content">
          <span class="game-label">Bloques / reflejos</span>
          <h2>Tetris</h2>
          <p>Velocidad, líneas y precisión en modo clásico.</p>
        </div>

        <a class="game-button" href="https://www.scad.mx/arc-tetris" data-game="tetris">
          Jugar
        </a>
      </article>

      <article class="game-card game-damas">
        <div class="game-glow"></div>

        <div class="game-icon">◼</div>

        <div class="game-content">
          <span class="game-label">Tablero / estrategia</span>
          <h2>Damas</h2>
          <p>Movimiento táctico y captura en tablero clásico.</p>
        </div>

        <a class="game-button" href="https://www.scad.mx/arc-damas" data-game="damas">
          Jugar
        </a>
      </article>
    </section>

    <footer class="arcade-footer">
      <span>Powered by SCaD</span>
    </footer>
  </main>

  <script src="app.js?v=13"></script>
</body>
</html>
