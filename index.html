<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ARCADE</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />

  <meta name="theme-color" content="#111827" />
</head>

<body>
  <main class="arcade-app">
    <header class="arcade-header">
      <div>
        <h1>ARCADE</h1>
        <p>Portal de juegos</p>
      </div>

      <span class="arcade-version">PWA</span>
    </header>

    <section class="arcade-grid" aria-label="Juegos disponibles">
      <article class="game-card">
        <div class="game-icon">▦</div>
        <div class="game-info">
          <h2>Tetris</h2>
          <p>Juego clásico de bloques.</p>
        </div>
        <a class="game-button" href="#" data-game="tetris">Entrar</a>
      </article>

      <article class="game-card">
        <div class="game-icon">◼</div>
        <div class="game-info">
          <h2>Damas</h2>
          <p>Juego clásico de tablero.</p>
        </div>
        <a class="game-button" href="#" data-game="damas">Entrar</a>
      </article>
    </section>

    <footer class="arcade-footer">
      <span>Powered by SCaD</span>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
